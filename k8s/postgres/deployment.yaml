apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: game-backlog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: gamebacklog-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gamebacklog-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "gamebacklog_dev"
              valueFrom:
                secretKeyRef:
                  name: gamebacklog-secrets
                  key: POSTGRES_DB
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: game-backlog
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432