apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket
  namespace: game-backlog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket
  template:
    metadata:
      labels:
        app: websocket
    spec:
      containers:
        - name: websocket
          image: game-backlog-ws:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: PORT
              value: "3001"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: websocket
  namespace: game-backlog
spec:
  selector:
    app: websocket
  ports:
    - port: 80
      targetPort: 3001
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: websocket-route
  namespace: game-backlog
spec:
  parentRefs:
    - name: tp-gateway
  hostnames:
    - "ws.192.168.49.2.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: websocket
          port: 80
