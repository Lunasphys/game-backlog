apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: game-backlog
spec:
  parentRefs:
    - name: tp-gateway
  hostnames:
    - "web.192.168.49.2.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80