name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  # ─── Job 1: Build Docker images and push to ACR ───────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrgamebacklogdev

      - name: Build and push backend image
        run: |
          docker build -t acrgamebacklogdev.azurecr.io/backend:${{ github.sha }} ./backend-nextjs/
          docker push acrgamebacklogdev.azurecr.io/backend:${{ github.sha }}
          docker tag acrgamebacklogdev.azurecr.io/backend:${{ github.sha }} acrgamebacklogdev.azurecr.io/backend:latest
          docker push acrgamebacklogdev.azurecr.io/backend:latest

      - name: Build and push backend migration image
        run: |
          docker build --target migrator -t acrgamebacklogdev.azurecr.io/backend-migrate:${{ github.sha }} ./backend-nextjs/
          docker push acrgamebacklogdev.azurecr.io/backend-migrate:${{ github.sha }}
          docker tag acrgamebacklogdev.azurecr.io/backend-migrate:${{ github.sha }} acrgamebacklogdev.azurecr.io/backend-migrate:latest
          docker push acrgamebacklogdev.azurecr.io/backend-migrate:latest

      - name: Build and push frontend image
        run: |
          docker build -t acrgamebacklogdev.azurecr.io/frontend:${{ github.sha }} ./frontend-react/
          docker push acrgamebacklogdev.azurecr.io/frontend:${{ github.sha }}
          docker tag acrgamebacklogdev.azurecr.io/frontend:${{ github.sha }} acrgamebacklogdev.azurecr.io/frontend:latest
          docker push acrgamebacklogdev.azurecr.io/frontend:latest

  # ─── Job 2: Run Terraform to update infrastructure ────────────────────────
  terraform:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        working-directory: infra/
        run: terraform apply -auto-approve -lock-timeout=5m
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_db_admin_password }}
          TF_VAR_rawg_api_key: ${{ secrets.TF_VAR_rawg_api_key }}

  # ─── Job 3: Run pending Prisma migrations against the database ────────────
  migrate:
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run migration job and wait for completion
        run: |
          set -eu
          JOB_NAME=ca-game-backlog-migrate-dev
          RESOURCE_GROUP=rg-game-backlog-dev

          az containerapp job start --name "$JOB_NAME" --resource-group "$RESOURCE_GROUP" --image acrgamebacklogdev.azurecr.io/backend-migrate:${{ github.sha }} -o none

          for i in $(seq 1 30); do
            STATUS=$(az containerapp job execution list \
              --name "$JOB_NAME" --resource-group "$RESOURCE_GROUP" \
              --query "sort_by([], &properties.startTime)[-1].properties.status" -o tsv)
            echo "Migration job status: $STATUS"
            case "$STATUS" in
              Succeeded) exit 0 ;;
              Failed|"") if [ "$STATUS" = "Failed" ]; then exit 1; fi ;;
            esac
            sleep 10
          done

          echo "Timed out waiting for migration job to complete"
          exit 1